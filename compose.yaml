services:
  truenas-smart-exporter:
    build:
      context: .
      dockerfile: Dockerfile

    image: truenas-smart-exporter:local
    container_name: truenas-smart-exporter

    privileged: true

    ports:
      - "9111:9111"

    volumes:
      - /dev:/dev
      - /run/udev:/run/udev:ro

    restart: unless-stopped
